<!doctype html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Fetch Location</title><link rel="stylesheet" href="styles.css" /></head><body><main class="flow-page"><a class="brand" href="index.html"><span class="brand-mark">F</span><span>FreshCut Fish</span></a><section class="flow-card"><span class="modal-kicker">Delivery location</span><h1>Fetch and confirm location</h1><p id="locationStatus">Click the button to request browser location permission and show the delivery area.</p><button class="checkout-button" id="fetchLocation">Fetch my location</button><a class="quiet-button" href="index.html">Back to store</a></section></main><script>document.querySelector('#fetchLocation').addEventListener('click',function(){var status=document.querySelector('#locationStatus');if(!navigator.geolocation){status.textContent='Location is not supported in this browser.';return;}status.textContent='Requesting location...';navigator.geolocation.getCurrentPosition(function(pos){status.textContent='Location fetched: '+pos.coords.latitude.toFixed(4)+', '+pos.coords.longitude.toFixed(4)+'. Delivery availability check can connect here.';},function(){status.textContent='Location permission was not granted. Enter address manually in the next step.';});});</script></body></html>
